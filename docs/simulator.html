<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charter Simulator — Phase 2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const FSM_STATES = {
      INIT:        { color: "#f59e0b", label: "INIT",        desc: "Awaiting first claim" },
      STRUCTURING: { color: "#00d4ff", label: "STRUCTURING", desc: "Compiling claim into artifact" },
      GATE_CHECK:  { color: "#7c3aed", label: "GATE_CHECK",  desc: "Applying G1–G5" },
      DIVERSIFY:   { color: "#f59e0b", label: "DIVERSIFY",   desc: "Injecting competing explanations" },
      CONVERGE:    { color: "#10b981", label: "CONVERGE",    desc: "Exhausted scrutiny — artifact ready" },
      RESTART:     { color: "#ef4444", label: "RESTART",     desc: "Structural flaw — recompile required" },
      OUTPUT:      { color: "#00d4ff", label: "OUTPUT",      desc: "Artifact produced" },
    };

    const GATES = [
      { id: "G1", name: "Numeric completeness",    desc: "≥2 numeric thresholds defined", key: "numeric" },
      { id: "G2", name: "Bounded scope",           desc: "Claim is specific and limited", key: "bounded" },
      { id: "G3", name: "Operational definitions", desc: "Key terms map to measurables",  key: "operational" },
      { id: "G4", name: "Test rigidity",           desc: "Thresholds set before running", key: "rigid" },
      { id: "G5", name: "Mechanism status",        desc: "Mechanism declared or labeled phenomenological", key: "mechanism" },
    ];

    const KNOWN_GAPS = {
      "G-01": { severity: "HIGH",   title: "No Initialization Procedure",          trigger: "INIT→STRUCTURING" },
      "G-02": { severity: "HIGH",   title: "DIVERSIFY Trigger Undefined",           trigger: "DIVERSIFY" },
      "G-03": { severity: "HIGH",   title: "No Watchdog / Degradation Detection",   trigger: "consecutive_converge" },
      "G-04": { severity: "MEDIUM", title: "Gate Failure Sequencing Undefined",     trigger: "gate_fail" },
      "G-05": { severity: "MEDIUM", title: "Evidence Hierarchy Dimensionality",     trigger: "evidence_level" },
      "G-06": { severity: "MEDIUM", title: "Objection Register Untyped",            trigger: "objection_add" },
      "G-07": { severity: "LOW",    title: "No Deserialization Protocol",           trigger: "compress" },
      "G-08": { severity: "LOW",    title: "Constraint Health Unmeasurable",        trigger: "GATE_CHECK" },
    };

    const SEV_COLOR = { HIGH: "#ef4444", MEDIUM: "#f59e0b", LOW: "#6b7280" };
    const EVIDENCE_LEVELS = ["E1","E2","E3","E4","E5"];

    function evaluateGates(claim, gateAnswers) {
      return GATES.map(g => {
        const ans = gateAnswers[g.key];
        if (ans === undefined) return { ...g, result: "PENDING" };
        return { ...g, result: ans ? "PASS" : "FAIL" };
      });
    }

    function allGatesPass(gateResults) {
      return gateResults.every(g => g.result === "PASS");
    }

    function anyGateFail(gateResults) {
      return gateResults.some(g => g.result === "FAIL");
    }

    function makeInitialSession() {
      return {
        fsmState: "INIT",
        activeClaim: null,
        gateAnswers: {},
        gateResults: GATES.map(g => ({ ...g, result: "PENDING" })),
        evidenceLevel: null,
        objectionRegister: [],
        stateTrace: [{ state: "INIT", ts: Date.now(), note: "Session started" }],
        gapLog: [{ gapId: "G-01", ts: Date.now(), note: "Boot: initialization procedure undefined" }],
        consecutiveConverge: 0,
        compressCount: 0,
        turnCount: 0,
      };
    }
    export default function CharterSimulator() {
      const [session, setSession] = useState(makeInitialSession());
      const [input, setInput] = useState("");
      const [objInput, setObjInput] = useState("");
      const [activeTab, setActiveTab] = useState("session");
      const [pendingDiversify, setPendingDiversify] = useState(false);
      const [showCompress, setShowCompress] = useState(false);
      const traceRef = useRef(null);

      useEffect(() => {
        if (traceRef.current) traceRef.current.scrollTop = traceRef.current.scrollHeight;
      }, [session.stateTrace]);

      function transition(newState, note, gapIds = []) {
        setSession(prev => {
          const newGaps = gapIds.map(id => ({ gapId: id, ts: Date.now(), note }));
          const newTrace = [...prev.stateTrace, { state: newState, ts: Date.now(), note }];
          const consecutive = newState === "CONVERGE" ? prev.consecutiveConverge + 1 : 0;
          const watchdogGap = (consecutive >= 3 && !prev.gapLog.find(g => g.gapId === "G-03" && g.note.includes("watchdog")))
            ? [{ gapId: "G-03", ts: Date.now(), note: "Watchdog: 3+ consecutive CONVERGE with no RESTART or DIVERSIFY" }]
            : [];
          return {
            ...prev,
            fsmState: newState,
            stateTrace: newTrace,
            gapLog: [...prev.gapLog, ...newGaps, ...watchdogGap],
            consecutiveConverge: consecutive,
          };
        });
      }

      function submitClaim() {
        if (!input.trim()) return;
        const claim = input.trim();
        setInput("");
        setSession(prev => ({
          ...prev,
          activeClaim: claim,
          gateAnswers: {},
          gateResults: GATES.map(g => ({ ...g, result: "PENDING" })),
          evidenceLevel: null,
          turnCount: prev.turnCount + 1,
        }));
        transition("STRUCTURING", `Claim received: "${claim.slice(0, 60)}${claim.length > 60 ? "…" : ""}"`);
      }

      function setGateAnswer(key, val) {
        setSession(prev => {
          const newAnswers = { ...prev.gateAnswers, [key]: val };
          const results = evaluateGates(prev.activeClaim, newAnswers);
          const allAnswered = GATES.every(g => newAnswers[g.key] !== undefined);
          let newState = prev.fsmState;
          const newGaps = [];

          if (allAnswered) {
            newGaps.push("G-08");
            if (anyGateFail(results)) {
              newGaps.push("G-04");
            }
          }

          return {
            ...prev,
            gateAnswers: newAnswers,
            gateResults: results,
            fsmState: allAnswered ? "GATE_CHECK" : prev.fsmState,
            stateTrace: allAnswered
              ? [...prev.stateTrace, { state: "GATE_CHECK", ts: Date.now(), note: "All gates evaluated" }]
              : prev.stateTrace,
            gapLog: allAnswered
              ? [...prev.gapLog, ...newGaps.map(id => ({ gapId: id, ts: Date.now(), note: `Gate evaluation: ${KNOWN_GAPS[id].title}` }))]
              : prev.gapLog,
          };
        });
      }

      function resolveGates() {
        const { gateResults } = session;
        if (anyGateFail(gateResults)) {
          const failCount = gateResults.filter(g => g.result === "FAIL").length;
          if (failCount >= 3) {
            transition("RESTART", "≥3 gates failed — structural recompile required");
          } else {
            transition("STRUCTURING", `${failCount} gate(s) failed — targeted restructuring`);
          }
        } else {
          setPendingDiversify(true);
        }
      }

      function confirmDiversify(yes) {
        setPendingDiversify(false);
        if (yes) {
          setSession(prev => ({
            ...prev,
            gapLog: [...prev.gapLog, { gapId: "G-02", ts: Date.now(), note: "DIVERSIFY trigger required human confirmation (anthropomorphic trigger undefined for LLM)" }],
          }));
          transition("DIVERSIFY", "Operator confirmed: premature convergence risk detected", []);
        } else {
          transition("CONVERGE", "Gates passed, scrutiny exhausted — CONVERGE");
        }
      }

      function addObjection() {
        if (!objInput.trim()) return;
        const obj = {
          id: `OBJ-${String(session.objectionRegister.length + 1).padStart(3, "0")}`,
          text: objInput.trim(),
          status: "OPEN",
          ts: Date.now(),
        };
        setObjInput("");
        setSession(prev => ({
          ...prev,
          objectionRegister: [...prev.objectionRegister, obj],
          gapLog: [...prev.gapLog, { gapId: "G-06", ts: Date.now(), note: "Objection added — register schema undefined in Charter" }],
        }));
      }

      function resolveObjection(id, status) {
        setSession(prev => ({
          ...prev,
          objectionRegister: prev.objectionRegister.map(o => o.id === id ? { ...o, status } : o),
        }));
      }

      function setEvidence(level) {
        setSession(prev => ({
          ...prev,
          evidenceLevel: level,
          gapLog: [...prev.gapLog, { gapId: "G-05", ts: Date.now(), note: `Evidence level ${level} assigned — hierarchy dimensionality gap applies` }],
        }));
        transition("OUTPUT", `Evidence level ${level} assigned — artifact output`);
      }

      function doCompress() {
        setSession(prev => ({
          ...prev,
          compressCount: prev.compressCount + 1,
          gapLog: [...prev.gapLog, { gapId: "G-07", ts: Date.now(), note: "/compress triggered — deserialization protocol undefined" }],
        }));
        setShowCompress(true);
        transition("OUTPUT", "/compress: State Compression produced", ["G-07"]);
      }

      function resetSession() {
        setSession(makeInitialSession());
        setPendingDiversify(false);
        setShowCompress(false);
        setInput("");
        setObjInput("");
        setActiveTab("session");
      }
      const { fsmState, activeClaim, gateResults, gateAnswers, objectionRegister, stateTrace, gapLog, evidenceLevel } = session;
      const currentState = FSM_STATES[fsmState];
      const allGatesAnswered = GATES.every(g => gateAnswers[g.key] !== undefined);
      const openObjections = objectionRegister.filter(o => o.status === "OPEN").length;

      return (
        <div style={{
          fontFamily: "'JetBrains Mono', 'IBM Plex Mono', monospace",
          background: "#080b0f",
          color: "#b0bec5",
          minHeight: "100vh",
          display: "flex",
          flexDirection: "column",
        }}>

          <div style={{
            background: "#0d1117",
            borderBottom: "1px solid #1a2030",
            padding: "12px 20px",
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            gap: "16px",
            flexWrap: "wrap",
          }}>
            <div>
              <div style={{ fontSize: "9px", color: "#4a5568", letterSpacing: "0.2em" }}>CHARTER SIMULATOR · PHASE 2 · LIVE SESSION</div>
              <div style={{ fontSize: "15px", fontWeight: "700", color: "#e2e8f0", letterSpacing: "0.05em", marginTop: "2px" }}>
                SESSION <span style={{ color: currentState.color }}>:{fsmState}</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
              {Object.entries(FSM_STATES).map(([k, v]) => (
                <div key={k} style={{
                  padding: "3px 8px",
                  fontSize: "9px",
                  letterSpacing: "0.12em",
                  border: `1px solid ${fsmState === k ? v.color : "#1a2030"}`,
                  color: fsmState === k ? v.color : "#2a3545",
                  background: fsmState === k ? v.color + "18" : "transparent",
                  transition: "all 0.2s",
                }}>{k}</div>
              ))}
            </div>

            <div style={{ display: "flex", gap: "8px" }}>
              <StatPill label="GAPS" value={gapLog.length} color="#ef4444" />
              <StatPill label="TURNS" value={session.turnCount} color="#00d4ff" />
              <StatPill label="OBJ" value={openObjections} color="#f59e0b" />
              <button onClick={doCompress} style={btnStyle("#10b981")}>/compress</button>
              <button onClick={resetSession} style={btnStyle("#6b7280")}>RESET</button>
            </div>
          </div>

          <div style={{ display: "flex", flex: 1, minHeight: 0 }}>

            <div style={{
              width: "340px",
              minWidth: "280px",
              background: "#0d1117",
              borderRight: "1px solid #1a2030",
              display: "flex",
              flexDirection: "column",
              overflowY: "auto",
              padding: "16px",
              gap: "14px",
            }}>

              <Panel label="CLAIM INPUT" color="#00d4ff">
                <div style={{ fontSize: "10px", color: "#4a5568", marginBottom: "6px" }}>Enter a claim or hypothesis to process through the Charter.</div>
                <textarea
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitClaim(); }}}
                  placeholder="e.g. 'KSG outperforms histogram MI estimation by 10× on BCI workloads'"
                  style={{
                    width: "100%",
                    background: "#080b0f",
                    border: "1px solid #1a2030",
                    color: "#b0bec5",
                    fontSize: "11px",
                    padding: "8px",
                    resize: "vertical",
                    minHeight: "64px",
                    fontFamily: "inherit",
                    boxSizing: "border-box",
                  }}
                />
                <button onClick={submitClaim} disabled={!input.trim()} style={{ ...btnStyle("#00d4ff"), marginTop: "6px", width: "100%", opacity: input.trim() ? 1 : 0.4 }}>
                  SUBMIT CLAIM →
                </button>
              </Panel>

              {activeClaim && (
                <Panel label="ACTIVE CLAIM" color="#7c3aed">
                  <div style={{ fontSize: "11px", color: "#e2e8f0", lineHeight: "1.6", fontStyle: "italic" }}>"{activeClaim}"</div>
                  {evidenceLevel && (
                    <div style={{ marginTop: "8px", fontSize: "10px", color: "#10b981" }}>Evidence: <strong>{evidenceLevel}</strong></div>
                  )}
                </Panel>
              )}

              {(fsmState === "STRUCTURING" || fsmState === "GATE_CHECK" || fsmState === "DIVERSIFY") && activeClaim && (
                <Panel label="GATE EVALUATOR §2" color="#7c3aed">
                  {GATES.map(g => {
                    const ans = gateAnswers[g.key];
                    const result = gateResults.find(r => r.key === g.key)?.result || "PENDING";
                    return (
                      <div key={g.key} style={{ marginBottom: "10px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "4px" }}>
                          <span style={{ fontSize: "10px", color: "#7c3aed", fontWeight: "700" }}>{g.id}</span>
                          <span style={{ fontSize: "9px", color: result === "PASS" ? "#10b981" : result === "FAIL" ? "#ef4444" : "#4a5568", letterSpacing: "0.1em" }}>{result}</span>
                        </div>
                        <div style={{ fontSize: "10px", color: "#6b7280", marginBottom: "5px" }}>{g.desc}</div>
                        <div style={{ display: "flex", gap: "6px" }}>
                          <button onClick={() => setGateAnswer(g.key, true)} style={{ ...miniBtn(ans === true ? "#10b981" : "#1a2030") }}>PASS</button>
                          <button onClick={() => setGateAnswer(g.key, false)} style={{ ...miniBtn(ans === false ? "#ef4444" : "#1a2030") }}>FAIL</button>
                        </div>
                      </div>
                    );
                  })}
                  {allGatesAnswered && fsmState !== "CONVERGE" && fsmState !== "OUTPUT" && (
                    <button onClick={resolveGates} style={{ ...btnStyle("#7c3aed"), width: "100%", marginTop: "4px" }}>
                      RESOLVE GATES →
                    </button>
                  )}
                </Panel>
              )}

              {pendingDiversify && (
                <Panel label="⚠ G-02 · DIVERSIFY TRIGGER" color="#ef4444">
                  <div style={{ fontSize: "10px", color: "#b0bec5", lineHeight: "1.6", marginBottom: "10px" }}>
                    All gates passed. The Charter's DIVERSIFY trigger is <span style={{ color: "#ef4444" }}>anthropomorphic and undefined for LLM execution</span>. Human confirmation required:
                  </div>
                  <div style={{ fontSize: "11px", color: "#e2e8f0", marginBottom: "10px", fontWeight: "600" }}>
                    Does this feel like premature convergence?
                  </div>
                  <div style={{ display: "flex", gap: "8px" }}>
                    <button onClick={() => confirmDiversify(true)} style={{ ...miniBtn("#f59e0b"), flex: 1 }}>YES — DIVERSIFY</button>
                    <button onClick={() => confirmDiversify(false)} style={{ ...miniBtn("#10b981"), flex: 1 }}>NO — CONVERGE</button>
                  </div>
                </Panel>
              )}

              {fsmState === "CONVERGE" && !evidenceLevel && (
                <Panel label="EVIDENCE LEVEL §5" color="#10b981">
                  <div style={{ fontSize: "10px", color: "#4a5568", marginBottom: "8px" }}>Assign evidence level to this claim. Note: G-05 fires on all assignments.</div>
                  <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                    {EVIDENCE_LEVELS.map(e => (
                      <button key={e} onClick={() => setEvidence(e)} style={{ ...miniBtn("#1a2030"), color: "#10b981" }}>{e}</button>
                    ))}
                  </div>
                </Panel>
              )}

              <Panel label={`OBJECTION REGISTER §4 · ${openObjections} OPEN`} color="#f59e0b">
                <div style={{ display: "flex", gap: "6px", marginBottom: "8px" }}>
                  <input
                    value={objInput}
                    onChange={e => setObjInput(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") addObjection(); }}
                    placeholder="Add objection…"
                    style={{
                      flex: 1, background: "#080b0f", border: "1px solid #1a2030",
                      color: "#b0bec5", fontSize: "10px", padding: "5px 8px", fontFamily: "inherit",
                    }}
                  />
                  <button onClick={addObjection} style={miniBtn("#f59e0b")}>+</button>
                </div>
                {objectionRegister.length === 0 && (
                  <div style={{ fontSize: "10px", color: "#2a3545" }}>No objections registered.</div>
                )}
                {objectionRegister.map(o => (
                  <div key={o.id} style={{
                    fontSize: "10px", marginBottom: "8px", paddingLeft: "8px",
                    borderLeft: `2px solid ${o.status === "OPEN" ? "#f59e0b" : o.status === "TESTED" ? "#10b981" : "#4a5568"}`,
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "3px" }}>
                      <span style={{ color: "#6b7280" }}>{o.id}</span>
                      <span style={{ color: o.status === "OPEN" ? "#f59e0b" : o.status === "TESTED" ? "#10b981" : "#4a5568", fontSize: "9px" }}>{o.status}</span>
                    </div>
                    <div style={{ color: "#b0bec5", lineHeight: "1.5", marginBottom: "4px" }}>{o.text}</div>
                    {o.status === "OPEN" && (
                      <div style={{ display: "flex", gap: "4px" }}>
                        <button onClick={() => resolveObjection(o.id, "TESTED")} style={miniBtn("#10b981", "8px", "2px 6px")}>TESTED</button>
                        <button onClick={() => resolveObjection(o.id, "UNTESTABLE")} style={miniBtn("#6b7280", "8px", "2px 6px")}>UNTESTABLE</button>
                      </div>
                    )}
                  </div>
                ))}
              </Panel>

            </div>
            <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>

              <div style={{ display: "flex", borderBottom: "1px solid #1a2030", background: "#0d1117" }}>
                {[["session", "STATE TRACE"], ["gaps", "GAP LOG"], ["compress", "STATE COMPRESSION"]].map(([id, label]) => (
                  <button key={id} onClick={() => setActiveTab(id)} style={{
                    background: "none", border: "none",
                    borderBottom: activeTab === id ? "2px solid #00d4ff" : "2px solid transparent",
                    color: activeTab === id ? "#00d4ff" : "#2a3545",
                    padding: "10px 18px", fontSize: "9px", letterSpacing: "0.15em", cursor: "pointer",
                  }}>{label} {id === "gaps" ? `(${gapLog.length})` : ""}</button>
                ))}
              </div>

              {activeTab === "session" && (
                <div ref={traceRef} style={{ flex: 1, overflowY: "auto", padding: "16px", display: "flex", flexDirection: "column", gap: "8px" }}>
                  {stateTrace.map((t, i) => {
                    const s = FSM_STATES[t.state];
                    return (
                      <div key={i} style={{
                        display: "flex", alignItems: "flex-start", gap: "12px",
                        padding: "10px 12px",
                        background: i === stateTrace.length - 1 ? s.color + "10" : "#0d1117",
                        border: `1px solid ${i === stateTrace.length - 1 ? s.color + "40" : "#1a2030"}`,
                        borderLeft: `3px solid ${s.color}`,
                        transition: "all 0.2s",
                      }}>
                        <div style={{ fontSize: "9px", color: "#2a3545", whiteSpace: "nowrap", marginTop: "1px" }}>
                          {String(i).padStart(3, "0")}
                        </div>
                        <div style={{ fontSize: "11px", fontWeight: "700", color: s.color, whiteSpace: "nowrap", minWidth: "100px" }}>
                          {t.state}
                        </div>
                        <div style={{ fontSize: "11px", color: "#6b7280", lineHeight: "1.5" }}>{t.note}</div>
                        <div style={{ fontSize: "9px", color: "#2a3545", whiteSpace: "nowrap", marginLeft: "auto" }}>
                          {new Date(t.ts).toLocaleTimeString()}
                        </div>
                      </div>
                    );
                  })}
                  {stateTrace.length === 0 && (
                    <div style={{ color: "#2a3545", fontSize: "12px", margin: "auto" }}>No transitions yet. Submit a claim to begin.</div>
                  )}
                </div>
              )}

              {activeTab === "gaps" && (
                <div style={{ flex: 1, overflowY: "auto", padding: "16px", display: "flex", flexDirection: "column", gap: "8px" }}>
                  {gapLog.map((g, i) => {
                    const gap = KNOWN_GAPS[g.gapId];
                    return (
                      <div key={i} style={{
                        padding: "10px 12px",
                        background: "#0d1117",
                        border: `1px solid ${SEV_COLOR[gap.severity]}30`,
                        borderLeft: `3px solid ${SEV_COLOR[gap.severity]}`,
                      }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "4px" }}>
                          <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
                            <span style={{ fontSize: "10px", fontWeight: "700", color: SEV_COLOR[gap.severity] }}>{g.gapId}</span>
                            <span style={{ fontSize: "11px", color: "#e2e8f0" }}>{gap.title}</span>
                          </div>
                          <span style={{ fontSize: "9px", color: SEV_COLOR[gap.severity], letterSpacing: "0.1em" }}>{gap.severity}</span>
                        </div>
                        <div style={{ fontSize: "10px", color: "#6b7280", lineHeight: "1.5" }}>{g.note}</div>
                        <div style={{ fontSize: "9px", color: "#2a3545", marginTop: "4px" }}>
                          {new Date(g.ts).toLocaleTimeString()} · trigger: {gap.trigger}
                        </div>
                      </div>
                    );
                  })}
                  {gapLog.length === 0 && (
                    <div style={{ color: "#2a3545", fontSize: "12px", margin: "auto" }}>No gaps encountered yet.</div>
                  )}
                </div>
              )}

              {activeTab === "compress" && (
                <div style={{ flex: 1, overflowY: "auto", padding: "16px" }}>
                  {showCompress ? (
                    <div style={{ background: "#0d1117", border: "1px solid #1a2030", padding: "16px", fontFamily: "monospace", fontSize: "11px", lineHeight: "1.8", color: "#b0bec5", whiteSpace: "pre-wrap" }}>
{`# STATE COMPRESSION · ${new Date().toISOString()}
# Charter Simulator · Session ${session.compressCount}

## FSM STATE
  Current: ${fsmState}

## ACTIVE CLAIM
  ${activeClaim || "none"}
  Evidence Level: ${evidenceLevel || "unassigned"}

## GATE STATUS
${GATES.map(g => `  ${g.id}: ${gateResults.find(r => r.key === g.key)?.result || "PENDING"}`).join("\n")}

## OBJECTION REGISTER
${objectionRegister.length === 0 ? "  none" : objectionRegister.map(o => `  ${o.id} [${o.status}] — ${o.text}`).join("\n")}

## GAP ENCOUNTERS THIS SESSION
${gapLog.map(g => `  ${g.gapId} · ${KNOWN_GAPS[g.gapId].title}`).join("\n")}

## STATE TRACE SUMMARY
  Total transitions: ${stateTrace.length}
  Turns: ${session.turnCount}
  Compresses: ${session.compressCount}

## SKEPTICAL RESIDUE
  Open objections: ${openObjections}
  Unresolved gates: ${gateResults.filter(g => g.result === "PENDING").length}

## NEXT STEP
  ${fsmState === "CONVERGE" ||<span style={{ color: currentState.color }}>:{fsmState}</span>
              </div>
            </div>

            <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
              {Object.entries(FSM_STATES).map(([k, v]) => (
                <div key={k} style={{
                  padding: "3px 8px",
                  fontSize: "9px",
                  letterSpacing: "0.12em",
                  border: `1px solid ${fsmState === k ? v.color : "#1a2030"}`,
                  color: fsmState === k ? v.color : "#2a3545",
                  background: fsmState === k ? v.color + "18" : "transparent",
                  transition: "all 0.2s",
                }}>{k}</div>
              ))}
            </div>

            <div style={{ display: "flex", gap: "8px" }}>
              <StatPill label="GAPS" value={gapLog.length} color="#ef4444" />
              <StatPill label="TURNS" value={session.turnCount} color="#00d4ff" />
              <StatPill label="OBJ" value={openObjections} color="#f59e0b" />
              <button onClick={doCompress} style={btnStyle("#10b981")}>/compress</button>
              <button onClick={resetSession} style={btnStyle("#6b7280")}>RESET</button>
            </div>
          </div>

          <div style={{ display: "flex", flex: 1, minHeight: 0 }}>

            <div style={{
              width: "340px",
              minWidth: "280px",
              background: "#0d1117",
              borderRight: "1px solid #1a2030",
              display: "flex",
              flexDirection: "column",
              overflowY: "auto",
              padding: "16px",
              gap: "14px",
            }}>

              <Panel label="CLAIM INPUT" color="#00d4ff">
                <div style={{ fontSize: "10px", color: "#4a5568", marginBottom: "6px" }}>Enter a claim or hypothesis to process through the Charter.</div>
                <textarea
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); submitClaim(); }}}
                  placeholder="e.g. 'KSG outperforms histogram MI estimation by 10× on BCI workloads'"
                  style={{
                    width: "100%",
                    background: "#080b0f",
                    border: "1px solid #1a2030",
                    color: "#b0bec5",
                    fontSize: "11px",
                    padding: "8px",
                    resize: "vertical",
                    minHeight: "64px",
                    fontFamily: "inherit",
                    boxSizing: "border-box",
                  }}
                />
                <button onClick={submitClaim} disabled={!input.trim()} style={{ ...btnStyle("#00d4ff"), marginTop: "6px", width: "100%", opacity: input.trim() ? 1 : 0.4 }}>
                  SUBMIT CLAIM →
                </button>
              </Panel>

              {activeClaim && (
                <Panel label="ACTIVE CLAIM" color="#7c3aed">
                  <div style={{ fontSize: "11px", color: "#e2e8f0", lineHeight: "1.6", fontStyle: "italic" }}>"{activeClaim}"</div>
                  {evidenceLevel && (
                    <div style={{ marginTop: "8px", fontSize: "10px", color: "#10b981" }}>Evidence: <strong>{evidenceLevel}</strong></div>
                  )}
                </Panel>
              )}

              {(fsmState === "STRUCTURING" || fsmState === "GATE_CHECK" || fsmState === "DIVERSIFY") && activeClaim && (
                <Panel label="GATE EVALUATOR §2" color="#7c3aed">
                  {GATES.map(g => {
                    const ans = gateAnswers[g.key];
                    const result = gateResults.find(r => r.key === g.key)?.result || "PENDING";
                    return (
                      <div key={g.key} style={{ marginBottom: "10px" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "4px" }}>
                          <span style={{ fontSize: "10px", color: "#7c3aed", fontWeight: "700" }}>{g.id}</span>
                          <span style={{ fontSize: "9px", color: result === "PASS" ? "#10b981" : result === "FAIL" ? "#ef4444" : "#4a5568", letterSpacing: "0.1em" }}>{result}</span>
                        </div>
                        <div style={{ fontSize: "10px", color: "#6b7280", marginBottom: "5px" }}>{g.desc}</div>
                        <div style={{ display: "flex", gap: "6px" }}>
                          <button onClick={() => setGateAnswer(g.key, true)} style={{ ...miniBtn(ans === true ? "#10b981" : "#1a2030") }}>PASS</button>
                          <button onClick={() => setGateAnswer(g.key, false)} style={{ ...miniBtn(ans === false ? "#ef4444" : "#1a2030") }}>FAIL</button>
                        </div>
                      </div>
                    );
                  })}
                  {allGatesAnswered && fsmState !== "CONVERGE" && fsmState !== "OUTPUT" && (
                    <button onClick={resolveGates} style={{ ...btnStyle("#7c3aed"), width: "100%", marginTop: "4px" }}>
                      RESOLVE GATES →
                    </button>
                  )}
                </Panel>
              )}

              {pendingDiversify && (
                <Panel label="⚠ G-02 · DIVERSIFY TRIGGER" color="#ef4444">
                  <div style={{ fontSize: "10px", color: "#b0bec5", lineHeight: "1.6", marginBottom: "10px" }}>
                    All gates passed. The Charter's DIVERSIFY trigger is <span style={{ color: "#ef4444" }}>anthropomorphic and undefined for LLM execution</span>. Human confirmation required:
                  </div>
                  <div style={{ fontSize: "11px", color: "#e2e8f0", marginBottom: "10px", fontWeight: "600" }}>
                    Does this feel like premature convergence?
                  </div>
                  <div style={{ display: "flex", gap: "8px" }}>
                    <button onClick={() => confirmDiversify(true)} style={{ ...miniBtn("#f59e0b"), flex: 1 }}>YES — DIVERSIFY</button>
                    <button onClick={() => confirmDiversify(false)} style={{ ...miniBtn("#10b981"), flex: 1 }}>NO — CONVERGE</button>
                  </div>
                </Panel>
              )}

              {fsmState === "CONVERGE" && !evidenceLevel && (
                <Panel label="EVIDENCE LEVEL §5" color="#10b981">
                  <div style={{ fontSize: "10px", color: "#4a5568", marginBottom: "8px" }}>Assign evidence level to this claim. Note: G-05 fires on all assignments.</div>
                  <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                    {EVIDENCE_LEVELS.map(e => (
                      <button key={e} onClick={() => setEvidence(e)} style={{ ...miniBtn("#1a2030"), color: "#10b981" }}>{e}</button>
                    ))}
                  </div>
                </Panel>
              )}

              <Panel label={`OBJECTION REGISTER §4 · ${openObjections} OPEN`} color="#f59e0b">
                <div style={{ display: "flex", gap: "6px", marginBottom: "8px" }}>
                  <input
                    value={objInput}
                    onChange={e => setObjInput(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") addObjection(); }}
                    placeholder="Add objection…"
                    style={{
                      flex: 1, background: "#080b0f", border: "1px solid #1a2030",
                      color: "#b0bec5", fontSize: "10px", padding: "5px 8px", fontFamily: "inherit",
                    }}
                  />
                  <button onClick={addObjection} style={miniBtn("#f59e0b")}>+</button>
                </div>
                {objectionRegister.length === 0 && (
                  <div style={{ fontSize: "10px", color: "#2a3545" }}>No objections registered.</div>
                )}
                {objectionRegister.map(o => (
                  <div key={o.id} style={{
                    fontSize: "10px", marginBottom: "8px", paddingLeft: "8px",
                    borderLeft: `2px solid ${o.status === "OPEN" ? "#f59e0b" : o.status === "TESTED" ? "#10b981" : "#4a5568"}`,
                  }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "3px" }}>
                      <span style={{ color: "#6b7280" }}>{o.id}</span>
                      <span style={{ color: o.status === "OPEN" ? "#f59e0b" : o.status === "TESTED" ? "#10b981" : "#4a5568", fontSize: "9px" }}>{o.status}</span>
                    </div>
                    <div style={{ color: "#b0bec5", lineHeight: "1.5", marginBottom: "4px" }}>{o.text}</div>
                    {o.status === "OPEN" && (
                      <div style={{ display: "flex", gap: "4px" }}>
                        <button onClick={() => resolveObjection(o.id, "TESTED")} style={miniBtn("#10b981", "8px", "2px 6px")}>TESTED</button>
                        <button onClick={() => resolveObjection(o.id, "UNTESTABLE")} style={miniBtn("#6b7280", "8px", "2px 6px")}>UNTESTABLE</button>
                      </div>
                    )}
                  </div>
                ))}
              </Panel>

            </div>
